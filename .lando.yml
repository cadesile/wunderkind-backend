name: wunderkind-backend
recipe: symfony
config:
  php: '8.4'
  via: nginx
  webroot: public
  database: mysql:8.0
  xdebug: false

services:
  appserver_nginx:
    overrides:
      ports:
        - "127.0.0.1:52100:80"

  database:
    type: mysql:8.0
    portforward: 3306
    creds:
      user: wunderkind
      password: wunderkind
      database: wunderkind

tooling:
  php:
    service: appserver
  composer:
    service: appserver
  symfony:
    service: appserver
    cmd: php bin/console
  mysql:
    service: database
