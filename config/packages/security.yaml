security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: /admin
            logout:
                path: admin_logout
                target: admin_login

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/admin/login,  roles: PUBLIC_ACCESS }
        - { path: ^/admin,        roles: ROLE_ADMIN }
        - { path: ^/api/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/,   roles: ROLE_ADMIN }
        - { path: ^/api/sync,             roles: ROLE_ACADEMY }
        - { path: ^/api/market/data,     roles: ROLE_ACADEMY }
        - { path: ^/api/market/assign,   roles: ROLE_ACADEMY }
        - { path: ^/api/academy/,        roles: ROLE_ACADEMY }
        - { path: ^/api/inbox,           roles: ROLE_ACADEMY }
        - { path: ^/api/finance/,        roles: ROLE_ACADEMY }
        - { path: ^/api/squad,           roles: ROLE_ACADEMY }
        - { path: ^/api/staff,           roles: ROLE_ACADEMY }
        - { path: ^/api/facilities,      roles: ROLE_ACADEMY }
        - { path: ^/api,                 roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
