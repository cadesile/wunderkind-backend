services:
  app:
    image: ghcr.io/cadesile/wunderkind-backend:stage
    container_name: wunderkind-stage
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://wunderkind:${DB_PASSWORD}@postgres-stage:5432/wunderkind?serverVersion=16&charset=utf8
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      ACADEMY_STARTING_BALANCE: ${ACADEMY_STARTING_BALANCE}
    depends_on:
      postgres-stage:
        condition: service_healthy

  postgres-stage:
    image: postgres:16-alpine
    container_name: postgres-stage
    restart: unless-stopped
    environment:
      POSTGRES_USER: wunderkind
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: wunderkind
    volumes:
      - /mnt/volume-wkf/wunderkind/staging/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wunderkind"]
      interval: 10s
      timeout: 5s
      retries: 5
